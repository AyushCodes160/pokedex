services:
  - type: web
    name: pokedex-arena
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: NODE_VERSION
        value: 20.11.0
